name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
            artifact: omniplayr-linux-x64
          - os: ubuntu-24.04-arm
            script: build:linux-arm64
            artifact: omniplayr-linux-arm64
          - os: windows-latest
            script: build:win
            artifact: omniplayr-win.exe
          - os: macos-latest
            script: build:mac-arm64
            artifact: omniplayr-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run ${{ matrix.script }}

      - name: Normalize output name
        run: |
          mkdir -p dist-out
          cp dist/* dist-out/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-out/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Validate artifacts
        run: |
          test -f dist/omniplayr-linux-x64
          test -f dist/omniplayr-linux-arm64
          test -f dist/omniplayr-win.exe
          test -f dist/omniplayr-macos-arm64

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e

          VERSION=${GITHUB_REF_NAME#v}

          SHA_MAC_ARM=$(shasum -a 256 dist/omniplayr-macos-arm64 | awk '{print $1}')
          SHA_LINUX_X64=$(shasum -a 256 dist/omniplayr-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM=$(shasum -a 256 dist/omniplayr-linux-arm64 | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/OmniPlayr/homebrew-tap.git
          cd homebrew-tap

          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/omniplayr.rb

          sed -i "s|releases/download/v[^/]*/omniplayr-macos-arm64|releases/download/v$VERSION/omniplayr-macos-arm64|" Formula/omniplayr.rb
          sed -i "s|releases/download/v[^/]*/omniplayr-linux-x64|releases/download/v$VERSION/omniplayr-linux-x64|" Formula/omniplayr.rb
          sed -i "s|releases/download/v[^/]*/omniplayr-linux-arm64|releases/download/v$VERSION/omniplayr-linux-arm64|" Formula/omniplayr.rb

          sed -i "/omniplayr-macos-arm64/{n;s/sha256 \".*\"/sha256 \"$SHA_MAC_ARM\"/}" Formula/omniplayr.rb
          sed -i "/omniplayr-linux-x64/{n;s/sha256 \".*\"/sha256 \"$SHA_LINUX_X64\"/}" Formula/omniplayr.rb
          sed -i "/omniplayr-linux-arm64/{n;s/sha256 \".*\"/sha256 \"$SHA_LINUX_ARM\"/}" Formula/omniplayr.rb

          git config user.email "info@wokki20.nl"
          git config user.name "OmniPlayr CI"

          git add Formula/omniplayr.rb
          git commit -m "Update omniplayr to v$VERSION"
          git push

      - name: Update Scoop manifest
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          set -e

          VERSION=${GITHUB_REF_NAME#v}
          SHA_WIN=$(shasum -a 256 dist/omniplayr-win.exe | awk '{print $1}')

          git clone https://x-access-token:${SCOOP_BUCKET_TOKEN}@github.com/OmniPlayr/scoop-bucket.git
          cd scoop-bucket

          cat > omniplayr.json << EOF
          {
            "version": "$VERSION",
            "description": "OmniPlayr CLI",
            "homepage": "https://github.com/OmniPlayr/OmniPlayr-CLI",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/OmniPlayr/OmniPlayr-CLI/releases/download/v$VERSION/omniplayr-win.exe",
                "hash": "$SHA_WIN"
              }
            },
            "bin": [
              ["omniplayr-win.exe", "omniplayr"]
            ]
          }
          EOF

          git config user.email "info@wokki20.nl"
          git config user.name "OmniPlayr CI"
          git add omniplayr.json
          git commit -m "Update omniplayr to v$VERSION"
          git push